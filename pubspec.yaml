name: fixco
description: "Fixco is a smart maintenance service app that connects users with trusted professionals for fast, reliable home and property services."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  url_launcher: ^6.2.5
  google_maps_flutter: ^2.5.0
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/