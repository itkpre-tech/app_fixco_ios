workflows:
  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fixer.kpre
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Inject provisioning profile
        script: |
          PROFILE_UUID="5af7596f-d4fd-426d-b36d-ab1e8f7de5af"

          # First let xcode-project use-profiles run
          xcode-project use-profiles

          # Then force inject the UUID directly
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\"/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\"/g" \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = Fixco_AppStore_Profile;/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";/g" \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/\"PROVISIONING_PROFILE_SPECIFIER\[sdk=iphoneos\*\]\" = \"\"/\"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]\" = \"$PROFILE_UUID\"/g" \
            ios/Runner.xcodeproj/project.pbxproj
          sed -i '' "s/\"PROVISIONING_PROFILE_SPECIFIER\[sdk=iphoneos\*\]\" = Fixco_AppStore_Profile;/\"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]\" = \"$PROFILE_UUID\";/g" \
            ios/Runner.xcodeproj/project.pbxproj

          echo "--- pbxproj check ---"
          grep "PROVISIONING_PROFILE_SPECIFIER" ios/Runner.xcodeproj/project.pbxproj

      - name: Create export options
        script: |
          PROFILE_UUID="5af7596f-d4fd-426d-b36d-ab1e8f7de5af"
          echo "Using profile UUID: $PROFILE_UUID"
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>QR7HGT644D</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.fixer.kpre</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "Export options:"
          cat /tmp/ExportOptions.plist

      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --build-number=12 \
            --export-options-plist=/tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration