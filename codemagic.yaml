workflows:
  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: Codemagic
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fixer.kpre
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Verify iOS Deployment Target (15.0)
        script: |
          echo "=== VERIFYING iOS 15.0 CONFIGURATION ==="
          
          # Check AppFrameworkInfo.plist
          echo "AppFrameworkInfo.plist MinimumOSVersion:"
          /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" ios/Flutter/AppFrameworkInfo.plist
          
          # Check xcconfig files
          echo -e "\nDebug.xcconfig deployment target:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/Flutter/Debug.xcconfig || echo "Not found"
          
          echo -e "\nRelease.xcconfig deployment target:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/Flutter/Release.xcconfig || echo "Not found"
          
          echo -e "\nGenerated.xcconfig deployment target:"
          grep "IPHONEOS_DEPLOYMENT_TARGET" ios/Flutter/Generated.xcconfig || echo "Not found"
          
          # Ensure the value is 15.0 (add if missing)
          if ! grep -q "IPHONEOS_DEPLOYMENT_TARGET = 15.0" ios/Flutter/Debug.xcconfig; then
            echo "IPHONEOS_DEPLOYMENT_TARGET = 15.0" >> ios/Flutter/Debug.xcconfig
            echo "✅ Added to Debug.xcconfig"
          fi
          
          if ! grep -q "IPHONEOS_DEPLOYMENT_TARGET = 15.0" ios/Flutter/Release.xcconfig; then
            echo "IPHONEOS_DEPLOYMENT_TARGET = 15.0" >> ios/Flutter/Release.xcconfig
            echo "✅ Added to Release.xcconfig"
          fi

      - name: Clean and Install Pods
        script: |
          echo "=== CLEANING AND INSTALLING PODS ==="
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Inject provisioning profile
        script: |
          PROFILE_UUID="5af7596f-d4fd-426d-b36d-ab1e8f7de5af"
          
          echo "=== INJECTING PROVISIONING PROFILE ==="
          xcode-project use-profiles
          
          # Direct injection
          cd ios
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\"/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\"/g" \
            Runner.xcodeproj/project.pbxproj
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = Fixco_AppStore_Profile;/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\";/g" \
            Runner.xcodeproj/project.pbxproj
          cd ..
          
          echo "✅ Provisioning profile injected"

      - name: Create export options
        script: |
          PROFILE_UUID="5af7596f-d4fd-426d-b36d-ab1e8f7de5af"
          TEAM_ID="QR7HGT644D"
          
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.fixer.kpre</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Flutter build IPA
        script: |
          echo "=== BUILDING IPA ==="
          flutter build ipa --release \
            --build-number=12 \
            --export-options-plist=/tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

      email:
        recipients:
          - it.kpre@gmail.com
        notify:
          success: true
          failure: true